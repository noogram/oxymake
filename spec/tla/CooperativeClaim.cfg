\* TLC configuration for CooperativeClaim.
\* Sessions = {s1,s2,s3}, Jobs = {j1,j2}, TTL = 2, MaxClock = 4 bound
\* state for tractable model-checking (briefing M3 verification gate).
\* The 2026-06-10 pre-pub pass added per-session belief state
\* (local_running, done_by — premortem H18), which enlarges the state
\* vector; bounds were retuned from the original 4 sessions / TTL 3 /
\* MaxClock 6 to keep the liveness check under a minute. The zombie
\* interleaving needs only 2 sessions and 1 job; 3 sessions keep a
\* margin for the reclaim-race arm.
\*
\* SessionFilterEnabled = TRUE is the shipped code (complete_job and
\* fail_job carry AND session_id=?). The red configuration —
\* SessionFilterEnabled = FALSE, expected to violate DoneByClaimHolder
\* — lives in CooperativeClaimUnguarded.cfg.

SPECIFICATION FairSpec

CONSTANTS
    Sessions = {s1, s2, s3}
    Jobs = {j1, j2}
    TTL = 2
    MaxClock = 4
    NoSession = NULL
    SessionFilterEnabled = TRUE

\* NoDoubleRunningBelief is intentionally absent: it is the documented
\* refutable formulation (zombie window) — add it here to watch TLC
\* produce the counterexample.
INVARIANTS
    TypeOK
    NoDoubleRunningDb
    DoneByClaimHolder
    AtMostOneClaimer

PROPERTIES
    EventualClaim
