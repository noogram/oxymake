\* TLC configuration for CacheConsistency.tla
\* Defaults: 2 workers, 3 rules — minimal CSTAFP-lite witness (ADR-015).
\* At N=2 workers and K=3 rules the BFS diameter is >= 12 levels, the
\* depth target named in the design panel §D-4 (Karpathy pilot).
\* Run with `-deadlock` to admit the quiescent terminal state
\* (Rules \subseteq RegisteredRules /\ cached_seen = Workers \X Rules)
\* as a legitimate idle, not a property violation.
\*
\* KeyVariants = {1} is the shipped (green) configuration: the cache
\* key is a pure function of the rule's declared inputs, so every
\* derivation — across worker crashes and re-claims — yields the same
\* key. The red configuration lives in CacheConsistencyNondetKey.cfg.

SPECIFICATION Spec

CONSTANTS
    Workers = {w1, w2}
    Rules   = {r1, r2, r3}
    NoClaim = NoClaim
    KeyVariants = {1}

INVARIANTS
    TypeOK
    CacheKeyDeterminism
    RegisterPrecedesRead
    NoDoubleRegister

PROPERTIES
    EventualSkip
