\* RED configuration for CooperativeClaim.tla — expected to FAIL.
\*
\* SessionFilterEnabled = FALSE models the pre-H16 terminal UPDATE:
\*   UPDATE jobs SET status='completed' WHERE id=? AND status='running'
\* (no session_id filter). A session whose claim was reclaimed after a
\* stale heartbeat can then terminalize the job a peer re-claimed —
\* TLC violates DoneByClaimHolder in a few steps:
\*   s1 claims j1 → s1 goes stale → Reclaim → s2 claims j1 →
\*   zombie s1 Terminalize(j1) lands → done_by[j1]=s1 # claim=s2.
\*
\* This file exists so the invariant's falsifiability is reproducible:
\* `spec/tla/run-tlc.sh --red` runs it and archives the trace
\* (TRACES.md entry 2026-06-10; fixed in ox-state db.rs by the
\* session-filter commit referenced there).

SPECIFICATION FairSpec

CONSTANTS
    Sessions = {s1, s2, s3}
    Jobs = {j1, j2}
    TTL = 2
    MaxClock = 4
    NoSession = NULL
    SessionFilterEnabled = FALSE

INVARIANTS
    TypeOK
    NoDoubleRunningDb
    DoneByClaimHolder
    AtMostOneClaimer
