\* RED configuration for CacheConsistency.tla — expected to FAIL.
\*
\* KeyVariants = {1, 2} models an undeclared input leaking into the
\* cache key (mtime in the key, environment drift, a non-hermetic
\* tool): the same rule can hash to different keys on different
\* executions. TLC refutes CacheKeyDeterminism in a few steps — a
\* worker materialises r1 with key 1, crashes before registering, a
\* peer re-claims r1 and materialises it with key 2.
\*
\* This file exists so the invariant's falsifiability is reproducible:
\* `spec/tla/run-tlc.sh --red` runs it and archives the trace. A green
\* CacheKeyDeterminism under the shipped config (KeyVariants = {1})
\* means something precisely because this config turns it red.

SPECIFICATION Spec

CONSTANTS
    Workers = {w1, w2}
    Rules   = {r1, r2, r3}
    NoClaim = NoClaim
    KeyVariants = {1, 2}

INVARIANTS
    TypeOK
    CacheKeyDeterminism
    RegisterPrecedesRead
    NoDoubleRegister
