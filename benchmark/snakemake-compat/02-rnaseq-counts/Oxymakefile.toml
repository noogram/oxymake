# Generated by ox-translate from Snakemake, manually fixed
ox_version = "0.1"

[config]
samples = ["control_1", "control_2", "treated_1", "treated_2"]
genome = "mock_genome"
min_quality = "20"

[rule.all]
input = [
    "results/count_matrix.tsv",
]

[rule.generate_reads]
output = { r1 = "data/reads/{sample}_R1.fastq", r2 = "data/reads/{sample}_R2.fastq" }
params = { n_reads = "50" }
shell = """
for i in $(seq 1 {params.n_reads}); do
    echo "@{sample}_read${i}/1" >> {output.r1}
    python3 -c "import random; random.seed($i); print(''.join(random.choices('ACGT', k=75)))" >> {output.r1}
    echo "+" >> {output.r1}
    python3 -c "print('I'*75)" >> {output.r1}

    echo "@{sample}_read${i}/2" >> {output.r2}
    python3 -c "import random; random.seed($i+1000); print(''.join(random.choices('ACGT', k=75)))" >> {output.r2}
    echo "+" >> {output.r2}
    python3 -c "print('I'*75)" >> {output.r2}
done
"""

[rule.generate_reads.wildcard_constraints]
sample = "[a-z]+_[0-9]+"

[rule.trim_reads]
input = { r1 = "data/reads/{sample}_R1.fastq", r2 = "data/reads/{sample}_R2.fastq" }
output = { r1 = "data/trimmed/{sample}_R1.trimmed.fastq", r2 = "data/trimmed/{sample}_R2.trimmed.fastq" }
params = { min_qual = "{config.min_quality}" }
resources = { cpu = 2 }
shell = """
cp {input.r1} {output.r1}
cp {input.r2} {output.r2}
"""

[rule.align]
input = { r1 = "data/trimmed/{sample}_R1.trimmed.fastq", r2 = "data/trimmed/{sample}_R2.trimmed.fastq" }
output = { bam = "results/aligned/{sample}.bam" }
params = { genome = "{config.genome}" }
resources = { cpu = 4, mem = "4000M" }
shell = """
echo "BAM_HEADER" > {output.bam}
head -2 {input.r1} | tail -1 | awk '{{ print "{sample}\t0\tchr1\t1\t60\t75M\t*\t0\t0\t" $0 }}' >> {output.bam}
"""

[rule.count_features]
input = { bam = "results/aligned/{sample}.bam" }
output = { counts = "results/counts/{sample}.counts.tsv" }
shell = """
echo "gene_id\t{sample}" > {output.counts}
for gene in GENE_A GENE_B GENE_C GENE_D GENE_E; do
    count=$((RANDOM % 1000))
    echo "$gene\t$count" >> {output.counts}
done
"""

[rule.merge_counts]
input = ["results/counts/{sample}.counts.tsv"]
output = ["results/count_matrix.tsv"]
expand = "product"
shell = """
first=true
for f in {input}; do
    if [ "$first" = true ]; then
        cat "$f" > {output}
        first=false
    else
        cut -f2 "$f" > {output}.col
        paste {output} {output}.col > {output}.tmp
        mv {output}.tmp {output}
        rm -f {output}.col
    fi
done
"""
