# Generated by ox-translate from Snakemake, manually fixed
ox_version = "0.1"

[config]
samples = ["A", "B", "C"]

[rule.all]
input = [
    "results/calls/all.vcf",
    "results/report.html",
]

[rule.create_genome]
output = [
    "data/genome.fa",
]
shell = """
echo ">chr1" > {output}
python3 -c "import random; random.seed(42); print(''.join(random.choices('ACGT', k=1000)))" >> {output}
"""

[rule.create_reads]
output = [
    "data/samples/{sample}.fastq",
]
params = { seed = "{sample}" }
shell = """
echo "@{sample}_read1" > {output}
python3 -c "import random; random.seed(hash('{params.seed}')); print(''.join(random.choices('ACGT', k=100)))" >> {output}
echo "+" >> {output}
python3 -c "print('I'*100)" >> {output}
echo "@{sample}_read2" >> {output}
python3 -c "import random; random.seed(hash('{params.seed}')+1); print(''.join(random.choices('ACGT', k=100)))" >> {output}
echo "+" >> {output}
python3 -c "print('I'*100)" >> {output}
"""

[rule.genome_index]
input = [
    "data/genome.fa",
]
output = [
    "data/genome.fa.idx",
]
shell = """
wc -c < {input} > {output}
echo "index_built" >> {output}
"""

[rule.map_reads]
input = { genome = "data/genome.fa", index = "data/genome.fa.idx", reads = "data/samples/{sample}.fastq" }
output = [
    "results/mapped/{sample}.bam",
]
resources = { cpu = 4 }
shell = """
echo "BAM_HEADER" > {output}
echo "{sample}\t0\tchr1\t1\t60\t100M\t*\t0\t0" >> {output}
"""

[rule.sort_bam]
input = [
    "results/mapped/{sample}.bam",
]
output = [
    "results/sorted/{sample}.sorted.bam",
]
shell = """
sort {input} > {output}
"""

[rule.call_variants]
input = { genome = "data/genome.fa", bams = "results/sorted/{sample}.sorted.bam" }
output = [
    "results/calls/all.vcf",
]
expand = "product"
shell = """
echo "##fileformat=VCFv4.2" > {output}
echo "#CHROM\tPOS\tID\tREF\tALT\tQUAL\tFILTER\tINFO" >> {output}
echo "chr1\t100\t.\tA\tT\t30\tPASS\t." >> {output}
echo "chr1\t200\t.\tG\tC\t25\tPASS\t." >> {output}
"""

[rule.report]
input = ["results/calls/all.vcf", "results/sorted/{sample}.sorted.bam"]
output = [
    "results/report.html",
]
expand = "product"
shell = """
vcf=$(echo {input} | tr ' ' '\n' | grep '.vcf$')
bams=$(echo {input} | tr ' ' '\n' | grep '.bam$' | tr '\n' ' ')
echo "<html><body>" > {output}
echo "<h1>Mapping Report</h1>" >> {output}
echo "<p>Samples: $bams</p>" >> {output}
echo "<p>Variants: $(grep -c -v '^#' $vcf) found</p>" >> {output}
echo "</body></html>" >> {output}
"""
