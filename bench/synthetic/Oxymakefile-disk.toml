# Synthetic benchmark: 20 identity jobs, 10M per output
# materialize = "always"
# Generated by bench/synthetic/generate.py

ox_version = "0.1"

[config]
results_dir = "bench_output"

# Seed: create initial random data
[rule.seed]
output = ["{config.results_dir}/step_000.bin"]
shell = "dd if=/dev/urandom of={config.results_dir}/step_000.bin bs=10485760 count=1 2>/dev/null"

[rule.step_001]
input = ["{config.results_dir}/step_000.bin"]
output = ["{config.results_dir}/step_001.bin"]
shell = "python3 bench/synthetic/identity.py {config.results_dir}/step_000.bin {config.results_dir}/step_001.bin"

