# Secret-scan Gate — exogenous referee over credentials
#
# WHY THIS EXISTS
# ---------------
# janis classified the secret-audit protocol as SELF-refereed today and exogenous
# ONLY when (1) gitleaks runs in CI per PR, and (2) the job is listed in
# `required_status_checks` under branch protection. This workflow is layer (1).
# Layer (2) — the required-status wiring — is applied AFTER the public flip by
# scripts/apply-branch-protection.sh (branch protection is HTTP 403 on a private
# repo without Pro). Until then this is a RADAR; after wiring it is a GATE.
#
# Two stacked checks, mirroring adversary §1's protocol:
#   - `gitleaks detect --log-opts=--all`  → full history, every ref.
#   - `gitleaks protect`                  → the staged/PR diff (push-time shape).
#
# DISCIPLINE (janis (d) #3): there is deliberately NO `continue-on-error` and NO
# skip-env on this job. Adding either silently demotes it to advisory — forbidden.
# To silence this referee you must delete it in an attributable commit.
#
# This complements — does not replace — GitHub-side secret-scanning + push-
# protection (enabled by scripts/apply-branch-protection.sh post-flip). gitleaks
# catches what the GitHub service misses (custom rules, full-history sweep) and
# runs identically on a fork's PR where the GitHub service does not.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {} # manual fire; can make the build run, never make it pass.

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1" # pin: the exact version adversary §1 validated.

jobs:
  secret-scan:
    name: Secret scan (gitleaks, full history + diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --log-opts=--all sees every commit/ref.

      - name: Install pinned gitleaks
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Stage A — full-history detect (every ref)
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::gitleaks detect --log-opts=--all"
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --report-format json \
            --report-path /tmp/gitleaks-detect.json
          echo "::endgroup::"
          echo "OK: no secrets in history."

      - name: Stage B — protect the PR/push diff
        # `gitleaks protect` scans uncommitted/staged-shape changes. On a PR we
        # scan the range base..head; on a push we scan the new commits. A staged
        # form is the shape push-protection would reject server-side.
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "::group::gitleaks detect on PR range ${BASE_SHA}..${HEAD_SHA}"
          gitleaks detect \
            --source . \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --config .gitleaks.toml \
            --no-banner \
            --redact
          echo "::endgroup::"
          echo "OK: no secrets introduced by this PR."
