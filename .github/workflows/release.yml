name: Release

# Triggered by pushing a v* tag (see `just tag-release <version>`).
# Builds the `ox` binary for Linux + macOS and attaches tarballs to a
# GitHub Release. crates.io name reservation is a separate one-time manual
# step (see RELEASING.md) — not automated here.
#
# Supply-chain posture (security premortem):
#   - `gate` runs the full test suite, clippy -D warnings, and cargo-deny
#     advisories BEFORE any binary is built; build/release jobs depend on it.
#     A v* tag can never ship an untested binary.
#   - All actions are pinned by commit SHA, not moving tags — a hijacked
#     upstream tag cannot inject code into the release path.
#   - The toolchain is frozen to an exact version (not @stable), so a release
#     is reproducible against a known compiler.
#   - SHA-256 checksums of every tarball are published with the release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # Frozen release toolchain — bump deliberately, in a visible commit.
  RELEASE_RUST_TOOLCHAIN: "1.94.1"

jobs:
  gate:
    name: Release gate (test + clippy + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, frozen via `toolchain:`
        with:
          toolchain: ${{ env.RELEASE_RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-deny

      - name: cargo deny advisories
        run: cargo deny check advisories

  build:
    name: Build ${{ matrix.target }}
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, frozen via `toolchain:`
        with:
          toolchain: ${{ env.RELEASE_RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build ox
        run: cargo build --release --bin ox --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ox-${{ matrix.target }}.tar.gz ox
          cd ../../../
          shasum -a 256 ox-${{ matrix.target }}.tar.gz > ox-${{ matrix.target }}.tar.gz.sha256 \
            || sha256sum ox-${{ matrix.target }}.tar.gz > ox-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ox-${{ matrix.target }}
          path: |
            ox-${{ matrix.target }}.tar.gz
            ox-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec sha256sum {} \; \
            | sed 's|\./[^/]*/||' | sort -k2 > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/SHA256SUMS
            artifacts/**/*.sha256
